<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Debug</title>
<style>body{background:#0a0a0f;color:#e8e8f0;font-family:monospace;padding:2rem;}</style>
</head>
<body>
<h2>NFL Data Debug</h2>
<div id="out">Loading...</div>
<script>
const BASE = window.location.pathname.replace(/\/[^\/]*$/, '/');

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const hdrs  = lines[0].split(',').map(h => h.trim().replace(/"/g,''));
  return lines.slice(1).map(line => {
    const vals = line.split(','), obj = {};
    hdrs.forEach((h,i) => { const v=(vals[i]||'').trim().replace(/"/g,''); obj[h]=isNaN(v)||v===''?v:Number(v); });
    return obj;
  });
}

async function run() {
  const out = document.getElementById('out');
  try {
    out.innerHTML = 'Fetching summary CSV...';
    const r = await fetch(BASE + 'export_team_season_summary.csv');
    out.innerHTML += '<br>Status: ' + r.status;
    const text = await r.text();
    out.innerHTML += '<br>Rows: ' + text.trim().split('\n').length;
    const data = parseCSV(text);
    out.innerHTML += '<br>Parsed rows: ' + data.length;
    const seasons = [...new Set(data.map(r=>r.season))].sort();
    out.innerHTML += '<br>Seasons: ' + seasons.join(', ');
    const teams = [...new Set(data.map(r=>r.posteam))].sort();
    out.innerHTML += '<br>Teams (' + teams.length + '): ' + teams.slice(0,5).join(', ') + '...';
    const kc2025 = data.find(r=>r.posteam==='KC' && Number(r.season)===2025);
    out.innerHTML += '<br>KC 2025: ' + JSON.stringify(kc2025);
    out.innerHTML += '<br><br><strong style="color:#3ecf8e">DATA LOADS OK</strong>';
  } catch(e) {
    out.innerHTML += '<br><strong style="color:#f06a6a">ERROR: ' + e.message + '</strong>';
  }
}
run();
</script>
</body>
</html>
